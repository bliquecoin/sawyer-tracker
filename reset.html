<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>Reset Sawyer Tracker</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: calc(22px + env(safe-area-inset-top)) 18px calc(22px + env(safe-area-inset-bottom));
        background:
          radial-gradient(circle at 20% 10%, rgba(255, 107, 87, 0.12), transparent 34%),
          radial-gradient(circle at 85% 20%, rgba(145, 111, 255, 0.13), transparent 36%),
          #ffffff;
        color: #101116;
      }

      main {
        width: min(100%, 520px);
        padding: 22px;
        border: 1px solid rgba(255, 255, 255, 0.76);
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.76);
        box-shadow: 0 18px 50px rgba(23, 26, 35, 0.1);
        backdrop-filter: blur(24px) saturate(1.25);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.85rem;
        line-height: 1.06;
      }

      p {
        margin: 0 0 16px;
        color: #6d7480;
        line-height: 1.45;
      }

      a,
      button {
        display: inline-grid;
        min-height: 48px;
        width: 100%;
        place-items: center;
        border: 0;
        border-radius: 999px;
        background: #ff6b57;
        color: white;
        font: inherit;
        font-weight: 850;
        text-decoration: none;
      }

      .secondary {
        margin-top: 10px;
        background: rgba(16, 17, 22, 0.08);
        color: #101116;
      }

      .status {
        margin-top: 12px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Reset Sawyer Tracker</h1>
      <p>This clears Safari's old tracker cache, local browser database, and offline app worker. Your Supabase records are not deleted.</p>
      <button id="reset-button" type="button">Reset Safari Cache</button>
      <a class="secondary" href="./?fresh=1">Open Tracker</a>
      <p id="status" class="status" role="status">Ready.</p>
    </main>

    <script>
      const statusNode = document.querySelector("#status");
      const button = document.querySelector("#reset-button");

      async function clearTrackerCache() {
        try {
          const pendingCount = await countPendingCloudRecords();
          if (
            pendingCount > 0 &&
            !confirm(`${pendingCount} cached record${pendingCount === 1 ? "" : "s"} may not be confirmed in Supabase. Clear this device cache anyway?`)
          ) {
            statusNode.textContent = "Reset cancelled.";
            return;
          }

          statusNode.textContent = "Clearing Safari cache...";
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }

          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(
              keys
                .filter((key) => key.startsWith("sawyer-tracker"))
                .map((key) => caches.delete(key))
            );
          }

          if ("indexedDB" in window) {
            await new Promise((resolve) => {
              const request = indexedDB.deleteDatabase("sawyer-care-tracker");
              const timeout = setTimeout(resolve, 1800);
              request.onsuccess = () => {
                clearTimeout(timeout);
                resolve();
              };
              request.onerror = () => {
                clearTimeout(timeout);
                resolve();
              };
              request.onblocked = () => {
                clearTimeout(timeout);
                resolve();
              };
            });
          }

          sessionStorage.removeItem("sawyerFreshReset");
          sessionStorage.removeItem("sawyerServiceWorkerRetired");
          statusNode.textContent = "Done. Opening tracker...";
          window.location.replace("./?fresh=1");
        } catch (error) {
          statusNode.textContent = "Reset could not finish. Use Safari Settings > Advanced > Website Data and remove bliquecoin.github.io.";
        }
      }

      async function countPendingCloudRecords() {
        if (!("indexedDB" in window)) return 0;
        return new Promise((resolve) => {
          const request = indexedDB.open("sawyer-care-tracker");
          request.onerror = () => resolve(0);
          request.onsuccess = () => {
            const db = request.result;
            const storeNames = ["profile", "schedules", "events"].filter((name) => db.objectStoreNames.contains(name));
            if (!storeNames.length) {
              db.close();
              resolve(0);
              return;
            }

            let pending = 0;
            const transaction = db.transaction(storeNames, "readonly");
            storeNames.forEach((name) => {
              const records = transaction.objectStore(name).getAll();
              records.onsuccess = () => {
                pending += (records.result || []).filter((record) => record.syncStatus !== "synced").length;
              };
            });
            transaction.oncomplete = () => {
              db.close();
              resolve(pending);
            };
            transaction.onerror = () => {
              db.close();
              resolve(0);
            };
          };
        });
      }

      button.addEventListener("click", clearTrackerCache);
    </script>
  </body>
</html>
